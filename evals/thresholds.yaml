schema_version: 2
evaluation_dataset_version: not_configured
release_status: blocked_until_labeled_holdout

human_review:
  minimum_independent_annotators: 2
  adjudication_required: true
  agreement_report_required: true
  locked_holdout_required: true

clustering:
  pairwise_f1_min: 0.90
  overmerge_rate_max: 0.05
  undermerge_rate_max: 0.10
  hard_negative_accuracy_min: 0.95

frames:
  macro_f1_min: 0.80
  per_frame_recall_min: 0.70
  evidence_precision_min: 0.90
  evidence_recall_min: 0.75

reporting:
  citation_coverage_min: 0.95
  citation_support_precision_min: 0.95
  unsupported_claim_rate_max: 0.02

calibration:
  required_before_numeric_confidence: true
  expected_calibration_error_max: 0.05

fixtures:
  synthetic_smoke_only: true
  production_release_requires_real_labeled_cases: true
