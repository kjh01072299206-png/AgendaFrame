name: Apply resumable body framing batches

on:
  push:
    branches:
      - codex/authorized-body-fetch
    paths:
      - .github/workflows/apply-resumable-body-batches.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/authorized-body-fetch
          fetch-depth: 1
      - name: Apply validated source
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/agendaframe-body-batch-payload.tar.gz
          tar -xzf /tmp/agendaframe-body-batch-payload.tar.gz
          git add -- \
            site/README.md \
            site/app/admin/admin-client.tsx \
            site/db/schema.ts \
            site/docs/public-api-contract.md \
            site/docs/source-panel.md \
            site/drizzle/0004_colossal_kylun.sql \
            site/drizzle/meta/0004_snapshot.json \
            site/drizzle/meta/_journal.json \
            site/tests/mvp.test.mjs \
            site/worker/analysis.mjs \
            site/worker/runtime.mjs
          git rm -- .github/workflows/apply-resumable-body-batches.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add resumable body framing batches"
          git push origin HEAD:codex/authorized-body-fetch
